<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titash Roy Choudhury - Resume</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6;
      color: #333;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 60px 40px;
      text-align: center;
      max-width: 600px;
    }
    h1 {
      font-size: 36px;
      margin-bottom: 10px;
      color: #000;
    }
    .title {
      font-size: 20px;
      color: #667eea;
      margin-bottom: 30px;
    }
    .buttons {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 30px;
    }
    a {
      display: inline-block;
      padding: 12px 30px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .btn-primary {
      background: #667eea;
      color: white;
    }
    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
      border: 2px solid #667eea;
    }
    .btn-secondary:hover {
      background: #667eea;
      color: white;
    }
    .contact {
      margin-top: 30px;
      font-size: 14px;
      color: #666;
    }
    .contact a {
      color: #667eea;
      text-decoration: none;
      display: inline;
      padding: 0;
    }
    .badge {
      display: inline-block;
      padding: 4px 12px;
      background: #e8f0fe;
      color: #667eea;
      border-radius: 20px;
      font-size: 12px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Titash Roy Choudhury</h1>
    <div class="title">Senior Cloud Data Engineer @ SEB</div>
    
    <div class="buttons">
      <a href="/resume.pdf" class="btn-primary">📥 Download PDF</a>
      <a href="/resume.html" class="btn-secondary">👁️ View Online</a>
    </div>
    
    <div class="contact">
      <p>📧 <a href="mailto:titash@live.in">titash@live.in</a> | 
         📱 <a href="tel:+46707393785">+46 70-739 37 85</a></p>
    </div>
    
    <div class="badge">
      Last updated: <span id="lastUpdated"></span>
    </div>
  </div>
  
  <script>
    // Load and display last updated date from resume.json
    fetch('/resume.json')
      .then(r => r.json())
      .then(data => {
        const date = new Date().toLocaleDateString('en-US', {
          year: 'numeric',
          month: 'short',
          day: 'numeric'
        });
        document.getElementById('lastUpdated').textContent = date;
      });
  </script>
</body>
</html>
