name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Install fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-dejavu-core

      - name: Regenerate resume.md and resume.pdf from resume.json
        run: uv run python scripts/generate_resume.py

      - name: Commit regenerated files if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/resume.md docs/pdf/resume.pdf
          git diff --cached --quiet || git commit -m "chore: regenerate resume.md and resume.pdf from resume.json [skip ci]"
          git push origin main || true

      - name: Deploy to gh-pages
        run: uv run mkdocs gh-deploy --force
