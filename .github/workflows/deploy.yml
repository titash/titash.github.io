name: Build and Deploy Resume to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'resume.json'
      - 'scripts/**'
      - 'public/**'
      - 'docs/**'
      - 'mkdocs.yml'
      - 'package.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Setup Python for mkdocs
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install mkdocs and theme
        run: pip install mkdocs mkdocs-material
      
      - name: Generate PDF from resume
        run: node scripts/generate-pdf.js
        continue-on-error: true
      
      - name: Build documentation site
        run: mkdocs build
        continue-on-error: true
      
      - name: Prepare deployment directory
        run: |
          mkdir -p out
          cp -r public/* out/ 2>/dev/null || true
          cp -r site/* out/docs/ 2>/dev/null || true
          mkdir -p out/pdfs
          cp resume.pdf out/pdfs/ 2>/dev/null || true
          cp resume.json out/ 2>/dev/null || true
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'out'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
