site_name: Titash Roy Choudhury - Resume
site_description: Professional resume - Cloud Data Engineer
site_url: https://titash.github.io/
repo_url: https://github.com/titash/titash.github.io
repo_name: titash/titash.github.io

# Theme: Material theme for a professional resume-like appearance
theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.top
    - toc.integrate

extra_css:
  - stylesheets/resume.css

plugins:
  - search

markdown_extensions:
  - toc
  - tables
  - attr_list
